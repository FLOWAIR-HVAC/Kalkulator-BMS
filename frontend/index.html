<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator BMS — Rejestry Modbus</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Kalkulator BMS</h1>
  <p>Obliczanie adresów rejestrów Modbus dla urządzeń podłączonych do sterowników SYSTEMU FLOWAIR</p>
</header>

<main>
  <section class="form-section">
    <div class="form-row">
      <div class="field-group">
        <label>Sterownik</label>
        <select id="controllerType">
          <option value="tbox">T-box</option>
          <option value="tbox_zone">T-box Zone</option>
          <option value="mbox">M-box</option>
        </select>
      </div>
      <div class="field-group" id="mode-field">
        <label>Tryb pracy</label>
        <div class="radio-group">
          <label class="mode-tip" data-tip="W tym trybie sterujemy każdym urządzeniem indywidualnie, ekran sterownika T-box jest zablokowany"><input type="radio" name="mode" value="single" checked> Single</label>
          <label class="mode-tip" data-tip="W tym trybie sterujemy grupami tych samych urządzeń, ekran sterownika T-box jest odblokowany"><input type="radio" name="mode" value="group"> Group</label>
        </div>
      </div>
    </div>

    <div class="devices-header">
      <span>Urządzenia</span>
    </div>

    <div id="devices-container">
      <!-- Wiersze urządzeń dodawane dynamicznie -->
    </div>

    <div id="mbox-form" style="display:none">
      <div class="form-row mbox-row">
        <div class="field-group">
          <label>Typ urządzenia</label>
          <select id="mbox-device-type">
            <option value="">— wybierz —</option>
            <option value="LEO D (AC/EC)">LEO D (AC/EC)</option>
            <option value="ELIS (AC) — kurtyna powietrzna">ELIS (AC) — kurtyna</option>
            <option value="SLIM (AC) — kurtyna powietrzna">SLIM (AC) — kurtyna</option>
            <option value="KM — Komora Mieszania">KM — Komora Mieszania</option>
            <option value="LEO M (EC)">LEO M (EC)</option>
            <option value="ROOFTOP">ROOFTOP</option>
            <option value="LEO V (AC)">LEO V (AC)</option>
            <option value="LEO EL (AC)">LEO EL (AC)</option>
            <option value="LEO COOL (AC)">LEO COOL (AC)</option>
            <option value="ROBUR R KM NEXT">ROBUR R KM NEXT</option>
            <option value="ROBUR R NEXT">ROBUR R NEXT</option>
            <option value="LUNA">LUNA</option>
            <option value="OXEN">OXEN</option>
          </select>
        </div>
        <div class="field-group">
          <label>DeviceID <span class="field-hint">(1–32)</span></label>
          <input type="number" id="mbox-device-id" min="1" max="32" value="1">
        </div>
        <div class="field-group">
          <label>Numer strefy <span class="field-hint">(1–6, opcja)</span></label>
          <input type="number" id="mbox-zone-num" min="1" max="6" placeholder="—">
        </div>
      </div>
    </div>

    <div class="form-actions" id="mbox-actions" style="display:none">
      <button id="btn-mbox-calculate" type="button" class="btn-primary">Oblicz</button>
    </div>

    <div class="form-actions">
      <button id="btn-add-device" type="button">+ Dodaj urządzenie</button>
      <button id="btn-calculate" type="button" class="btn-primary">Oblicz</button>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>
  </section>

  <section id="results" style="display:none">
    <div class="results-header">
      <h2>Wyniki</h2>
      <button id="btn-reset" type="button" class="btn-secondary">Nowe obliczenie</button>
    </div>
    <div id="results-content"></div>
  </section>
</main>

<script src="js/devices-data.js"></script>
<script src="js/calculator.js"></script>
<script src="js/app.js"></script>
</body>
</html>
